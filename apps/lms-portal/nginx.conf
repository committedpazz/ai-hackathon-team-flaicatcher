server {
	listen 80;
	server_name _;
	root /usr/share/nginx/html;
	index index.html;

	# React Router uses client-side routing; fall back to index.html for any
	# path that isn't a real static file so deep links (e.g. /trainings/:id)
	# work on a full page load/refresh.
	location / {
		try_files $uri $uri/ /index.html;
	}
}
