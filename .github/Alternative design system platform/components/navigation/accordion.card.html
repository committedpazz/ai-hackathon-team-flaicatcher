<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<link rel="stylesheet" href="../../styles.css" />
		<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
		<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
		<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
		<script src="../../_ds_bundle.js"></script>
		<style>
			body {
				margin: 0;
				padding: 28px;
				background: #1b2547;
				font-family: var(--font-sans);
			}
		</style>
	</head>
	<body>
		<div id="r"></div>
		<script type="text/plain" id="jsxsrc">
			const NS = Object.values(window).find(v => v && typeof v === "object" && v.Accordion) || {};
			const { Accordion } = NS;
			ReactDOM.createRoot(document.getElementById("r")).render(
			  <Accordion items={[
			    { label: "Wat we doen", children: [{label:"Testen"},{label:"Beheer"},{label:"Analyse"}] },
			    { label: "Solutions" },
			    { label: "Werken bij" },
			    { label: "Over Cerios" },
			  ]} />
			);
		</script>
		<script>
			(function () {
				var s = document.getElementById("jsxsrc").textContent;
				(0, eval)(Babel.transform(s, { presets: [["react", { runtime: "classic" }]] }).code);
			})();
		</script>
	</body>
</html>
