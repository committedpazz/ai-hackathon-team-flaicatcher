<!-- @dsCard group="Marketing" viewport="430x932" subtitle="Cerios homepage — hero, bands, menu overlay" -->
<!-- @startingPoint section="Marketing" subtitle="Cerios mobile homepage recreation" viewport="430x932" -->
<!doctype html>
<html lang="nl">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Cerios — homepage</title>
		<link rel="stylesheet" href="../../styles.css" />
		<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
		<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
		<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
		<style>
			body {
				margin: 0;
				background: #e9e9e4;
				font-family: var(--font-sans);
			}
			#app {
				max-width: 480px;
				margin: 0 auto;
				background: #fff;
				min-height: 100vh;
				position: relative;
				overflow: hidden;
			}
			img {
				display: block;
				max-width: 100%;
			}
		</style>
	</head>
	<body>
		<div id="app"></div>
		<script type="text/plain" id="jsxsrc">
			/* Standalone copies of the DS components so this kit renders before the bundle is compiled.
			   Once the project File type = Design System, prefer mounting from window.<Namespace> via _ds_bundle.js. */
			const Arrow = () => (<svg width="20" height="20" viewBox="0 0 24 24" fill="none" style={{flexShrink:0}}><path d="M4 12h15M13 6l6 6-6 6" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>);

			function Button({children, variant="primary", size="md", arrow=true, href, onClick}) {
			  const sizes={sm:{padding:"10px 20px",fontSize:15,gap:8},md:{padding:"16px 30px",fontSize:18,gap:12}};
			  const variants={
			    primary:{background:"var(--ce-green-400)",color:"var(--ce-navy-800)"},
			    cream:{background:"var(--ce-cream)",color:"var(--ce-navy-700)"},
			    navy:{background:"var(--ce-navy-900)",color:"#fff"},
			    "outline-on-dark":{background:"transparent",color:"#fff",border:"1px solid var(--ce-divider-on-dark)"},
			  };
			  const s=sizes[size]||sizes.md, v=variants[variant]||variants.primary;
			  const [h,setH]=React.useState(false);
			  const style={display:"inline-flex",alignItems:"center",justifyContent:"center",gap:s.gap,padding:s.padding,
			    fontFamily:"var(--font-sans)",fontSize:s.fontSize,fontWeight:600,lineHeight:1,borderRadius:"999px",
			    cursor:"pointer",textDecoration:"none",whiteSpace:"nowrap",transition:"filter 150ms ease,background 150ms ease",
			    ...v, ...(h?(variant==="primary"?{background:"var(--ce-green-500)"}:{filter:"brightness(0.96)"}):{})};
			  const inner=<>{arrow&&<Arrow/>}<span>{children}</span></>;
			  const p={style,onMouseEnter:()=>setH(true),onMouseLeave:()=>setH(false)};
			  return href?<a href={href} {...p}>{inner}</a>:<button onClick={onClick} {...p}>{inner}</button>;
			}

			function Badge({children,tone="green"}){
			  const c={green:"var(--ce-green-400)","green-dark":"var(--ce-green-300)",ink:"var(--ce-navy-700)"}[tone];
			  return <span style={{fontSize:20,fontWeight:500,color:c}}>{children}</span>;
			}

			function Card({icon,title,body}){
			  return (<div style={{background:"#fff",borderRadius:"var(--radius-card)",padding:"var(--card-pad)",display:"flex",flexDirection:"column",gap:20}}>
			    <div style={{width:72,height:72,borderRadius:"var(--radius-tile)",background:"var(--ce-green-400)",color:"var(--ce-navy-800)",display:"flex",alignItems:"center",justifyContent:"center"}}>{icon}</div>
			    <div style={{display:"flex",flexDirection:"column",gap:10}}>
			      <h3 className="ce-h3" style={{fontSize:24}}>{title}</h3>
			      <p className="ce-body" style={{color:"var(--ce-gray-600)"}}>{body}</p>
			    </div>
			  </div>);
			}

			function Wordmark({onDark=false,tagline=true,size=30}){
			  const color=onDark?"#fff":"var(--ce-navy-700)";
			  return (<span style={{display:"inline-flex",alignItems:"center",gap:12}}>
			    <span style={{fontWeight:700,fontSize:size,letterSpacing:"-0.03em",color,lineHeight:1}}>cerios</span>
			    {tagline&&<span style={{fontWeight:500,fontSize:size*0.32,lineHeight:1.15,color,opacity:.85,borderLeft:`1.5px solid ${onDark?"rgba(255,255,255,.25)":"var(--ce-divider-on-light)"}`,paddingLeft:12}}>about<br/>software<br/>quality</span>}
			  </span>);
			}

			function NavBar({onMenu,menuOpen}){
			  return (<header style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"18px 24px",background:"#fff",borderBottom:"1px solid var(--ce-divider-on-light)"}}>
			    <Wordmark size={30}/>
			    <button aria-label="Menu" onClick={onMenu} style={{position:"relative",width:44,height:44,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:6,background:"transparent",border:"none",cursor:"pointer"}}>
			      <span style={{width:26,height:2.5,borderRadius:2,background:"var(--ce-navy-700)"}}/>
			      <span style={{width:26,height:2.5,borderRadius:2,background:"var(--ce-navy-700)"}}/>
			      <span style={{position:"absolute",top:6,right:4,width:9,height:9,borderRadius:"50%",background:"var(--ce-green-400)"}}/>
			    </button>
			  </header>);
			}

			function Accordion({items}){
			  const [open,setOpen]=React.useState(null);
			  return (<div style={{display:"flex",flexDirection:"column"}}>{items.map((it,i)=>{
			    const isOpen=open===i;
			    return (<div key={i} style={{borderBottom:"1px solid var(--ce-divider-on-dark)"}}>
			      <button onClick={()=>setOpen(isOpen?null:i)} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"26px 4px",background:"transparent",border:"none",cursor:"pointer",fontSize:30,fontWeight:500,letterSpacing:"-0.01em",color:"#fff",textAlign:"left"}}>
			        <span>{it.label}</span>
			        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" style={{transition:"transform 200ms ease",transform:isOpen?"rotate(45deg)":"none"}}><path d="M12 5v14M5 12h14" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>
			      </button>
			      {isOpen&&it.children&&<div style={{paddingBottom:24,display:"flex",flexDirection:"column",gap:14}}>{it.children.map((c,j)=><a key={j} href="#" style={{fontSize:19,color:"var(--ce-on-dark-body)"}}>{c.label}</a>)}</div>}
			    </div>);
			  })}</div>);
			}

			const Book=()=>(<svg width="34" height="34" viewBox="0 0 24 24" fill="currentColor"><path d="M6 4h3v16H6zM10.5 4h3v16h-3zM15.5 4.4l2.8.8-3.4 15.4-2.8-.7z"/></svg>);
			const People=()=>(<svg width="34" height="34" viewBox="0 0 24 24" fill="currentColor"><path d="M9 11a3.5 3.5 0 100-7 3.5 3.5 0 000 7zM16 11a3 3 0 100-6 3 3 0 000 6zM2 20c0-3.3 3.1-5.5 7-5.5s7 2.2 7 5.5zM16.5 13.2c2.8.3 5.5 2 5.5 4.8h-4.2c0-1.9-.6-3.5-1.3-4.8z"/></svg>);
			const Cert=()=>(<svg width="34" height="34" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 4.9 5.4.8-3.9 3.8.9 5.4-4.8-2.5-4.8 2.5.9-5.4L4.2 7.7l5.4-.8zM8 19l-1 3 5-2 5 2-1-3z"/></svg>);
			const HERO="https://images.unsplash.com/photo-1531482615713-2afd69097998?q=80&w=900&auto=format&fit=crop";
			const MEET="https://images.unsplash.com/photo-1573497491208-6b1acb260507?q=80&w=900&auto=format&fit=crop";

			function Menu({onClose}){
			  return (<div style={{position:"absolute",inset:0,background:"var(--ce-navy-900)",zIndex:50,display:"flex",flexDirection:"column",padding:"18px 24px 40px",overflowY:"auto"}}>
			    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
			      <Wordmark onDark tagline={false} size={30}/>
			      <button onClick={onClose} aria-label="Sluiten" style={{width:44,height:44,background:"transparent",border:"none",cursor:"pointer",color:"#fff"}}>
			        <svg width="30" height="30" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"/></svg>
			      </button>
			    </div>
			    <div style={{marginTop:36,marginBottom:28}}><Button variant="primary" onClick={onClose}>Contact</Button></div>
			    <Accordion items={[
			      {label:"Wat we doen",children:[{label:"Testen"},{label:"Beheer"},{label:"Analyse & advies"}]},
			      {label:"Solutions"},{label:"Werken bij"},{label:"Inspiratie"},{label:"Over Cerios"},
			    ]}/>
			  </div>);
			}

			function App(){
			  const [menu,setMenu]=React.useState(false);
			  return (<>
			    <div style={{position:"sticky",top:0,zIndex:20}}><NavBar menuOpen={menu} onMenu={()=>setMenu(true)}/></div>

			    <section style={{position:"relative",background:"var(--ce-navy-900)",color:"#fff",overflow:"hidden"}}>
			      <img src={HERO} alt="" style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",opacity:.5}}/>
			      <div style={{position:"absolute",inset:0,background:"linear-gradient(180deg, rgba(27,37,71,.55) 0%, rgba(27,37,71,.35) 45%, rgba(27,37,71,.85) 100%)"}}/>
			      <div style={{position:"relative",padding:"56px 24px 44px",display:"flex",flexDirection:"column",gap:24}}>
			        <h1 className="ce-display on-dark" style={{fontSize:44}}>Cerios about software quality</h1>
			        <p className="ce-body-lg on-dark" style={{maxWidth:360}}>Samen ontdekken we het volledige potentieel van mensen en software.</p>
			        <div style={{display:"flex",flexDirection:"column",gap:14,alignItems:"flex-start",marginTop:4}}>
			          <Button variant="primary" href="#">Onze vacatures</Button>
			          <Button variant="cream" href="#">Over Cerios</Button>
			        </div>
			      </div>
			    </section>

			    <section style={{background:"var(--ce-gray-50)",padding:"64px 24px"}}>
			      <h2 className="ce-display" style={{fontSize:40,marginBottom:20}}>Softwarekwaliteit die werkt voor jouw organisatie</h2>
			      <p className="ce-body" style={{marginBottom:16}}>Software moet doen wat het moet doen. En jij moet kunnen vertrouwen op wat je oplevert. Van testen en beheren tot analyseren en adviseren: wij hebben de expertise die nodig is voor betrouwbare softwarekwaliteit.</p>
			      <img src={MEET} alt="Twee collega's in gesprek" style={{width:"100%",borderRadius:"var(--radius-image)",marginTop:24}}/>
			      <div style={{marginTop:28,display:"flex",flexDirection:"column",gap:14,alignItems:"flex-start"}}>
			        <Button variant="navy" href="#">Wat we doen</Button>
			        <Button variant="cream" href="#">Cerios Academy</Button>
			      </div>
			    </section>

			    <section style={{position:"relative",background:"var(--ce-navy-900)",padding:"64px 24px",overflow:"hidden"}}>
			      <div style={{position:"absolute",inset:0,background:"var(--ce-glow)"}}/>
			      <div style={{position:"relative"}}>
			        <Badge tone="green-dark">Ontwikkeling</Badge>
			        <h2 className="ce-display on-dark" style={{fontSize:40,margin:"12px 0 20px"}}>Ontwikkel expertise die verschil maakt</h2>
			        <p className="ce-body on-dark" style={{marginBottom:36,maxWidth:380}}>Stilstaan betekent achteruitgaan. De Cerios Academy helpt jou en je team om voorop te blijven lopen met trainingen, certificeringen en kennisdeling die direct toepasbaar zijn in je werk.</p>
			        <div style={{display:"grid",gap:20}}>
			          <Card icon={<Book/>} title="Uitgebreid trainingsaanbod" body="Van basis tot expert niveau: ontwikkel vaardigheden die je direct toepast."/>
			          <Card icon={<People/>} title="Samen met experts" body="Leer van professionals die dagelijks dezelfde uitdagingen aangaan als jij."/>
			          <Card icon={<Cert/>} title="Erkende certificeringen" body="Valideer je expertise met certificeringen die organisaties herkennen."/>
			        </div>
			      </div>
			    </section>

			    <section style={{background:"var(--ce-green-400)",padding:"56px 24px",display:"flex",flexDirection:"column",gap:20}}>
			      <h2 className="ce-h2" style={{color:"var(--ce-navy-800)"}}>Softwarekwaliteit begint met een goed gesprek.</h2>
			      <p className="ce-body" style={{color:"var(--ce-navy-800)",opacity:.85}}>Heb je een vraag of wil je een project bespreken? We maken graag tijd voor je.</p>
			      <div><Button variant="navy" href="#">Neem contact op</Button></div>
			    </section>

			    <footer style={{background:"var(--ce-navy-950)",color:"var(--ce-on-dark-body)",padding:"48px 24px 40px"}}>
			      <Wordmark onDark tagline={false} size={30}/>
			      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"28px 20px",marginTop:32,fontSize:15}}>
			        <div style={{display:"flex",flexDirection:"column",gap:12}}><a href="#">Wat we doen</a><a href="#">Solutions</a><a href="#">Werken bij</a></div>
			        <div style={{display:"flex",flexDirection:"column",gap:12}}><a href="#">Inspiratie</a><a href="#">Over Cerios</a><a href="#">Contact</a></div>
			      </div>
			      <p className="ce-caption" style={{color:"var(--ce-on-dark-mute)",marginTop:36}}>© 2026 Cerios · contact@cerios.nl</p>
			    </footer>

			    {menu&&<Menu onClose={()=>setMenu(false)}/>}
			  </>);
			}
			ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
		</script>
		<script>
			(function () {
				var src = document.getElementById("jsxsrc").textContent;
				var code = Babel.transform(src, { presets: [["react", { runtime: "classic" }]] }).code;
				(0, eval)(code);
			})();
		</script>
	</body>
</html>
