<!-- @dsCard group="Spacing" viewport="700x150" subtitle="Corner radii — pills + rounded cards" name="Radius" -->
<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<link rel="stylesheet" href="../styles.css" />
		<style>
			body {
				margin: 0;
				padding: 24px;
				background: #fff;
				font-family: var(--font-sans);
				display: flex;
				gap: 20px;
				align-items: flex-end;
			}
			.col {
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 8px;
			}
			.box {
				width: 88px;
				height: 64px;
				background: #eef0f4;
				border: 1.5px solid #253358;
			}
			.t {
				font-size: 12px;
				color: #55607a;
			}
		</style>
	</head>
	<body>
		<div class="col">
			<div class="box" style="border-radius: 999px"></div>
			<span class="t">pill · 999</span>
		</div>
		<div class="col">
			<div class="box" style="border-radius: 24px"></div>
			<span class="t">tile · 24</span>
		</div>
		<div class="col">
			<div class="box" style="border-radius: 20px"></div>
			<span class="t">card · 20</span>
		</div>
		<div class="col">
			<div class="box" style="border-radius: 16px"></div>
			<span class="t">image · 16</span>
		</div>
		<div class="col">
			<div class="box" style="border-radius: 14px"></div>
			<span class="t">input · 14</span>
		</div>
	</body>
</html>
