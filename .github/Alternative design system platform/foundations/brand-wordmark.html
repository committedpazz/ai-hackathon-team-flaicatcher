<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<link rel="stylesheet" href="../styles.css" />
		<style>
			body {
				margin: 0;
				padding: 0;
				font-family: var(--font-sans);
				display: flex;
			}
			.half {
				flex: 1;
				display: flex;
				align-items: center;
				justify-content: center;
				gap: 14px;
				padding: 24px;
			}
			.wm {
				font-weight: 700;
				font-size: 38px;
				letter-spacing: -0.03em;
				line-height: 1;
			}
			.tag {
				font-weight: 500;
				font-size: 12px;
				line-height: 1.15;
				padding-left: 12px;
			}
		</style>
	</head>
	<body>
		<div class="half" style="background: #fff">
			<span class="wm" style="color: #253358">cerios</span>
			<span class="tag" style="color: #253358; border-left: 1.5px solid rgba(37, 51, 88, 0.2)"
				>about<br />software<br />quality</span
			>
		</div>
		<div class="half" style="background: #1b2547">
			<span class="wm" style="color: #fff">cerios</span>
			<span class="tag" style="color: #fff; border-left: 1.5px solid rgba(255, 255, 255, 0.25)"
				>about<br />software<br />quality</span
			>
		</div>
	</body>
</html>
