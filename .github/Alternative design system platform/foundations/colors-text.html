<!-- @dsCard group="Colors" viewport="700x130" subtitle="Text tones on light and dark" name="Text colors" -->
<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:0;font-family:var(--font-sans);display:flex}
.half{flex:1;padding:20px;display:flex;flex-direction:column;gap:10px}
.row{display:flex;align-items:baseline;gap:10px}.dot{width:14px;height:14px;border-radius:50%;border:1px solid rgba(0,0,0,.1)}
.lbl{font-size:14px;font-weight:600}.hex{font-size:12px;opacity:.6}</style></head>
<body>
<div class="half" style="background:#fff">
  <div class="row"><span class="dot" style="background:#253358"></span><span class="lbl" style="color:#253358">Heading</span><span class="hex" style="color:#253358">#253358</span></div>
  <div class="row"><span class="dot" style="background:#55607a"></span><span class="lbl" style="color:#55607a">Body</span><span class="hex" style="color:#55607a">#55607a</span></div>
  <div class="row"><span class="dot" style="background:#9aa3b8"></span><span class="lbl" style="color:#9aa3b8">Muted</span><span class="hex" style="color:#9aa3b8">#9aa3b8</span></div>
</div>
<div class="half" style="background:#1b2547">
  <div class="row"><span class="dot" style="background:#fff"></span><span class="lbl" style="color:#fff">Heading</span><span class="hex" style="color:#fff">white</span></div>
  <div class="row"><span class="dot" style="background:rgba(255,255,255,.87)"></span><span class="lbl" style="color:rgba(255,255,255,.87)">Body</span><span class="hex" style="color:#fff">87%</span></div>
  <div class="row"><span class="dot" style="background:#8ceab4"></span><span class="lbl" style="color:#8ceab4">Eyebrow</span><span class="hex" style="color:#8ceab4">#8ceab4</span></div>
</div>
</body></html>
