<!-- @dsCard group="Spacing" viewport="700x140" subtitle="4px base scale" name="Spacing scale" -->
<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<link rel="stylesheet" href="../styles.css" />
		<style>
			body {
				margin: 0;
				padding: 24px;
				background: #fff;
				font-family: var(--font-sans);
				display: flex;
				align-items: flex-end;
				gap: 16px;
			}
			.col {
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 6px;
			}
			.bar {
				background: #68e19c;
				border-radius: 4px;
				width: 28px;
			}
			.t {
				font-size: 12px;
				color: #55607a;
			}
		</style>
	</head>
	<body>
		<div class="col">
			<div class="bar" style="height: 8px"></div>
			<span class="t">8</span>
		</div>
		<div class="col">
			<div class="bar" style="height: 16px"></div>
			<span class="t">16</span>
		</div>
		<div class="col">
			<div class="bar" style="height: 24px"></div>
			<span class="t">24</span>
		</div>
		<div class="col">
			<div class="bar" style="height: 32px"></div>
			<span class="t">32</span>
		</div>
		<div class="col">
			<div class="bar" style="height: 48px"></div>
			<span class="t">48</span>
		</div>
		<div class="col">
			<div class="bar" style="height: 64px"></div>
			<span class="t">64</span>
		</div>
		<div class="col">
			<div class="bar" style="height: 80px"></div>
			<span class="t">80</span>
		</div>
	</body>
</html>
