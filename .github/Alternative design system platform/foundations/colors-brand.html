<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:20px;font-family:var(--font-sans);display:flex;gap:14px;flex-wrap:wrap}
.sw{display:flex;flex-direction:column;gap:6px}.chip{width:150px;height:70px;border-radius:14px;border:1px solid var(--ce-divider-on-light)}
.n{font-size:13px;font-weight:600;color:var(--ce-navy-700)}.h{font-size:12px;color:var(--ce-gray-400)}</style></head>
<body>
<div class="sw"><div class="chip" style="background:#1b2547"></div><span class="n">Navy 900</span><span class="h">#1b2547</span></div>
<div class="sw"><div class="chip" style="background:#253358"></div><span class="n">Ink 700</span><span class="h">#253358</span></div>
<div class="sw"><div class="chip" style="background:#68e19c"></div><span class="n">Green 400</span><span class="h">#68e19c</span></div>
<div class="sw"><div class="chip" style="background:#efeee8"></div><span class="n">Cream</span><span class="h">#efeee8</span></div>
<div class="sw"><div class="chip" style="background:#f4f4f1"></div><span class="n">Gray 50</span><span class="h">#f4f4f1</span></div>
</body></html>
